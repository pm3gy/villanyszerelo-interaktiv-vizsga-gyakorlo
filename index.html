<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="Villanyszerelő interaktív vizsga gyakorló."
    />
    <title>Villanyszerelő - Épületvillamosság (4 0713 04 07) | Interaktív vizsga gyakorló</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --bg-2: #0c1c30;
        --card: rgba(11, 18, 32, 0.82);
        --card-border: rgba(148, 163, 184, 0.18);
        --text: #e5eefb;
        --muted: #a8b6c9;
        --accent: #7dd3fc;
        --accent-2: #a78bfa;
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(125, 211, 252, 0.18), transparent 28%),
          radial-gradient(circle at 85% 15%, rgba(167, 139, 250, 0.18), transparent 26%),
          linear-gradient(180deg, var(--bg), var(--bg-2));
        color: var(--text);
      }

      .wrap {
        width: min(940px, calc(100% - 24px));
        margin: 0 auto;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px 0;
      }

      .shell {
        width: 100%;
        display: grid;
        gap: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 5vw, 4.4rem);
        line-height: 1.02;
        letter-spacing: -0.04em;
        text-align: center;
      }

      .title-line {
        display: block;
      }

      .title-code {
        display: inline-block;
        margin-left: 0.35rem;
        font-size: 0.56em;
        letter-spacing: 0;
        opacity: 0.78;
        vertical-align: baseline;
        white-space: nowrap;
      }

      .title-subtitle {
        display: block;
        margin-top: 0.55rem;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        align-items: stretch;
      }

      .card {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 24px;
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .card h2 {
        margin: 0;
        font-size: 1.5rem;
      }

      .card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .card .button {
        margin-top: auto;
        align-self: flex-start;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 800;
        color: #07111f;
        background: linear-gradient(135deg, #7dd3fc, #38bdf8);
        transition: transform 120ms ease;
      }

      .button:hover {
        transform: translateY(-1px);
      }

      @media (max-width: 760px) {
        .wrap {
          width: min(100% - 16px, 940px);
          align-items: start;
        }

        .cards {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="shell">
        <h1>
          <span class="title-line">
            Villanyszerelő - Épületvillamosság
            <span class="title-code">(4 0713 04 07)</span>
          </span>
          <span class="title-subtitle">Interaktív vizsga gyakorló</span>
        </h1>
        <div class="cards">
          <article class="card">
            <h2>Vizsga gyakorló</h2>
            <p>
              A vizsgaszerű gyakorlófelület, ahol témaszűrő, kérdésszám,
              későbbre jelölés és kiértékelés is van.
            </p>
            <a class="button" href="./vizsga-mvp/">Indítás</a>
          </article>

          <article class="card">
            <h2>Infók</h2>
            <p>Forráskód, használati útmutató, kapcsolat.</p>
            <a class="button" href="./infok/">Megnyitás</a>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
